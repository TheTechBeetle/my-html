<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joes Form Example</title>

    <!-- These are for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script type="module" defer>
        const output = document.getElementById('output');

        const form = document.getElementById('joes-form');
        form.addEventListener('submit', (e) => {
            // prevent page submission
            e.preventDefault();

            const data = new FormData(form);
            const name = data.get('name');
            const age = data.get('age');
            console.log('Form Data', {
                name, age
            })
            output.innerText = `You are ${name}, you are ${age} years old`;
            // var p = document.createElement("p")
            // p.innerHTML = "you are "+name+" and "+age+" years old"
            // document.body.appendChild(p)
        })
    </script>
</head>

<body>
    <div class="container">

        <h1>Joes Form example</h1>

        <form id="joes-form">
            <div class="form-group">
                <label htmlFor="name">Name</label>
                <input class="form-control" name="name" value="frodo" />
            </div>
            <div class="form-group">
                <label htmlFor="age">Age</label>
                <input class="form-control" name='age' type="number" value="55" />
            </div>
            <button class="btn btn-primary" type="submit">Submit</button>
        </form>

        <p id="output"></p> 
    </div>
</body>

</html>
